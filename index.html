<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Football Position Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-info: #e6f1fb;
    --bg-success: #eaf3de;
    --bg-danger: #fcebeb;
    --text: #1a1a18;
    --text-secondary: #6b6b67;
    --text-info: #185fa5;
    --text-success: #3b6d11;
    --text-danger: #a32d2d;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --border-info: #378add;
    --border-success: #639922;
    --border-danger: #e24b4a;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #262624;
      --bg-info: #0c447c;
      --bg-success: #27500a;
      --bg-danger: #791f1f;
      --text: #f0ede8;
      --text-secondary: #9e9b94;
      --text-info: #85b7eb;
      --text-success: #97c459;
      --text-danger: #f09595;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.28);
      --border-info: #378add;
      --border-success: #639922;
      --border-danger: #e24b4a;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  .app-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .app-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 2rem;
  }

  .section-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  /* Phase select */
  .phase-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .phase-btn {
    padding: 1.5rem 1rem;
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s;
    color: var(--text);
  }
  .phase-btn:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
  .phase-icon { font-size: 28px; margin-bottom: 8px; }
  .phase-label { font-size: 16px; font-weight: 500; }
  .phase-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  /* Group pills */
  .group-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .group-btn {
    padding: 6px 14px;
    border-radius: 999px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.12s;
  }
  .group-btn:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
  .group-btn.active {
    background: var(--bg-info);
    color: var(--text-info);
    border-color: var(--border-info);
  }

  /* Position cards */
  .pos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .pos-card {
    padding: 14px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    transition: all 0.12s;
    text-align: left;
  }
  .pos-card:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
  .pos-abbr { font-size: 11px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.05em; }
  .pos-name { font-size: 14px; font-weight: 500; color: var(--text); margin-top: 4px; }

  /* Detail panel */
  .detail-panel {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg);
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .detail-header {
    padding: 1rem 1.25rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .detail-abbr-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--bg-info);
    color: var(--text-info);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .detail-title { font-size: 18px; font-weight: 500; color: var(--text); }
  .detail-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }

  .detail-tasks {
    padding: 1rem 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }

  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--text);
  }
  .task-row:last-child { margin-bottom: 0; }
  .task-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-secondary);
    margin-top: 5px;
    flex-shrink: 0;
  }

  /* Quiz */
  .quiz-section { padding: 1.25rem; }

  .quiz-header {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }

  .quiz-q {
    margin-bottom: 1.25rem;
    padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
  }
  .quiz-q:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .quiz-q-text { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 10px; line-height: 1.5; }

  .quiz-options { display: flex; flex-direction: column; gap: 6px; }

  .quiz-opt {
    padding: 9px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    transition: all 0.12s;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    width: 100%;
    font-family: inherit;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--border-hover); background: var(--bg-secondary); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-opt.correct { background: var(--bg-success); border-color: var(--border-success); color: var(--text-success); }
  .quiz-opt.wrong { background: var(--bg-danger); border-color: var(--border-danger); color: var(--text-danger); }
  .quiz-opt.reveal { background: var(--bg-success); border-color: var(--border-success); color: var(--text-success); }

  .opt-letter { font-weight: 500; flex-shrink: 0; }

  .feedback { font-size: 12px; margin-top: 8px; color: var(--text-secondary); line-height: 1.5; }

  /* Back button */
  .back-btn {
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-bottom: 1rem;
    font-family: inherit;
  }
  .back-btn:hover { color: var(--text); }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 0.5px solid var(--border);
  }
</style>
</head>

                tip: "Das 3-4-System hat zwei Inside Linebackers – sie teilen sich die Verantwortung des MLBs im 4-3."
              }
            ]
          }
        }
      },
      "Secondary": {
        label: "Secondary (Defensive Backs)",
        positions: {
          CB: {
            name: "Cornerback",
            tagline: "Eins-gegen-Eins-Spezialist – schattiert Wide Receiver und verhindert Pässe.",
            tasks: [
              "Deckt Wide Receiver in Man Coverage Eins-gegen-Eins",
              "Spielt Zone Coverage und patrouilliert assigned Bereiche",
              "Bricht auf kurze Pässe (Jams at line, Press Coverage)",
              "Tackelt bei Run Plays nahe der Sidelines"
            ],
            quiz: [
              {
                q: "Was ist 'Press Coverage' beim Cornerback?",
                opts: ["Er rückt auf die Linie vor und blockt", "Er positioniert sich direkt gegenüber dem WR und stört seinen Release", "Er blitzt durch die Linie"],
                correct: 1,
                tip: "Press Coverage unterbricht das Timing des Receivers und QBs – riskant, aber sehr effektiv."
              },
              {
                q: "Was ist eine 'Interception'?",
                opts: ["Ein Tackle hinter der Linie", "Der CB fängt einen für den Receiver bestimmten Pass", "Ein Holding-Foul"],
                correct: 1,
                tip: "Interceptions sind Turnover – sofortiger Ballbesitzwechsel, oft spielentscheidend."
              },
              {
                q: "Was ist der Unterschied zwischen Man Coverage und Zone Coverage?",
                opts: ["Kein Unterschied", "Man = ein Verteidiger deckt einen Receiver, Zone = Verteidiger deckt einen Bereich", "Zone ist nur für Safeties"],
                correct: 1,
                tip: "In Man Coverage folgt der CB dem WR überall – in Zone bleibt er in seinem Bereich."
              }
            ]
          },
          FS: {
            name: "Free Safety",
            tagline: "Letzte Verteidigungslinie – überwacht die tiefe Feldmitte und räumt auf.",
            tasks: [
              "Überwacht die tiefe Feldmitte gegen lange Pässe",
              "Liest den QB und reagiert auf Routen",
              "Hilft Cornerbacks in Cover-2 und Cover-3",
              "Interceptiert schlecht platzierte Pässe"
            ],
            quiz: [
              {
                q: "Warum heißt der Free Safety 'free'?",
                opts: ["Er ist nicht im Kader bezahlt", "Er ist ohne festen Deckungsauftrag und kann frei reagieren", "Er darf das Feld verlassen"],
                correct: 1,
                tip: "Ohne festen Man-Coverage-Auftrag kann der FS überall dort helfen, wo er gebraucht wird."
              },
              {
                q: "Was ist der Free Safety in einem Cover-3 System?",
                opts: ["Er rusht den QB", "Er deckt die mittlere Deep Zone alleine", "Er blitzt immer"],
                correct: 1,
                tip: "In Cover-3 teilen drei Verteidiger das Deep Field auf – der FS übernimmt die Mitte."
              }
            ]
          },
          SS: {
            name: "Strong Safety",
            tagline: "Hybrid-Verteidiger – physisch wie ein LB, aber mit Safety-Reichweite.",
            tasks: [
              "Positioniert näher an der Linie gegen Run Plays",
              "Deckt Tight Ends und größere Receivers",
              "Kann als Linebacker-Ersatz blitzen",
              "Unterstützt in Cover-2 auf seiner Seite"
            ],
            quiz: [
              {
                q: "Warum steht der Strong Safety näher an der Linie als der Free Safety?",
                opts: ["Er ist langsamer", "Er ist für den Tight End und Run Support zuständig", "Er deckt die Mitte des Feldes"],
                correct: 1,
                tip: "Der SS wird auf der 'starken Seite' (mit TE) eingesetzt – daher näher an der Linie."
              }
            ]
          },
          NB: {
            name: "Nickelback",
            tagline: "5. Defensive Back – kommt bei 3-Wide-Receiver-Formationen ins Spiel.",
            tasks: [
              "Ersetzt einen Linebacker gegen Pass-heavy Offenses",
              "Deckt den dritten Receiver (Slot Receiver)",
              "Kleiner und schneller als ein typischer LB",
              "Wichtig im modernen Pass-orientierten Football"
            ],
            quiz: [
              {
                q: "Wann kommt der Nickelback aufs Feld?",
                opts: ["Bei jedem Play", "Wenn die Offense drei oder mehr Wide Receiver aufstellt", "Nur bei Fieldgoal-Versuchen"],
                correct: 1,
                tip: "Der Name 'Nickel' kommt von der 5-Cent-Münze – er ist der 5. Defensive Back."
              }
            ]
          }
        }
      }
    }
  }
};

let state = {
  phase: null,
  group: null,
  pos: null,
  answers: {}
};

function render() {
  document.getElementById('root').innerHTML = buildHTML();
  attachEvents();
}

function buildHTML() {
  if (!state.phase) return buildPhaseSelect();
  if (!state.pos) return buildBrowser();
  return buildDetail();
}

function buildPhaseSelect() {
  return `
    <p class="section-label">Wähle eine Phase</p>
    <div class="phase-grid">
      ${Object.entries(DATA).map(([k, v]) => `
        <button class="phase-btn" data-phase="${k}">
          <div class="phase-icon">${v.icon}</div>
          <div class="phase-label">${v.label}</div>
          <div class="phase-sub">${v.sub}</div>
        </button>
      `).join('')}
    </div>
  `;
}

function buildBrowser() {
  const phase = DATA[state.phase];
  const groups = Object.keys(phase.groups);
  const activeGroup = state.group || groups[0];
  const positions = phase.groups[activeGroup].positions;

  return `
    <button class="back-btn" data-back="phase">← ${phase.label}</button>
    <p class="section-label">Gruppe</p>
    <div class="group-row">
      ${groups.map(g => `
        <button class="group-btn ${g === activeGroup ? 'active' : ''}" data-group="${g}">${phase.groups[g].label}</button>
      `).join('')}
    </div>
    <p class="section-label">Position wählen</p>
    <div class="pos-grid">
      ${Object.entries(positions).map(([abbr, pos]) => `
        <button class="pos-card" data-pos="${abbr}">
          <div class="pos-abbr">${abbr}</div>
          <div class="pos-name">${pos.name}</div>
        </button>
      `).join('')}
    </div>
  `;
}

function buildDetail() {
  const phase = DATA[state.phase];
  const activeGroup = state.group || Object.keys(phase.groups)[0];
  const pos = phase.groups[activeGroup].positions[state.pos];
  const ansKey = state.phase + '_' + state.pos;
  const ans = state.answers[ansKey] || {};

  const tasksHTML = pos.tasks.map(t => `
    <div class="task-row"><div class="task-dot"></div><span>${t}</span></div>
  `).join('');

  const letters = ['A', 'B', 'C', 'D'];

  const quizHTML = pos.quiz.map((q, qi) => {
    const chosen = ans[qi];
    const revealed = chosen !== undefined;
    const isCorrect = chosen === q.correct;

    const optsHTML = q.opts.map((opt, oi) => {
      let extraStyle = '';
      if (revealed) {
        if (oi === chosen && isCorrect) extraStyle = 'background:var(--bg-success);border-color:var(--border-success);color:var(--text-success)';
        else if (oi === chosen && !isCorrect) extraStyle = 'background:var(--bg-danger);border-color:var(--border-danger);color:var(--text-danger)';
        else if (oi === q.correct && !isCorrect) extraStyle = 'background:var(--bg-success);border-color:var(--border-success);color:var(--text-success)';
      }
      return `<button class="quiz-opt" data-qi="${qi}" data-oi="${oi}" ${revealed ? 'disabled' : ''} style="${extraStyle}">
        <span class="opt-letter">${letters[oi]}</span><span>${opt}</span>
      </button>`;
    }).join('');

    const feedbackHTML = revealed
      ? `<div class="feedback">${isCorrect ? '✓ Richtig!' : '✗ Falsch.'} ${q.tip}</div>`
      : '';

    return `
      <div class="quiz-q">
        <div class="quiz-q-text">${qi + 1}. ${q.q}</div>
        <div class="quiz-options">${optsHTML}</div>
        ${feedbackHTML}
      </div>
    `;
  }).join('');

  return `
    <button class="back-btn" data-back="browser">← ${phase.groups[activeGroup].label}</button>
    <div class="detail-panel">
      <div class="detail-header">
        <div>
          <div class="detail-title">${pos.name}</div>
          <div class="detail-subtitle">${pos.tagline}</div>
        </div>
        <div class="detail-abbr-badge">${state.pos}</div>
      </div>
      <div class="detail-tasks">
        <p class="section-label" style="margin-bottom:10px">Hauptaufgaben</p>
        ${tasksHTML}
      </div>
      <div class="quiz-section">
        <p class="quiz-header">Quiz</p>
        ${quizHTML}
      </div>
    </div>
  `;
}

function attachEvents() {
  document.querySelectorAll('[data-phase]').forEach(el => {
    el.addEventListener('click', () => {
      state.phase = el.dataset.phase;
      state.group = null;
      state.pos = null;
      render();
    });
  });

  document.querySelectorAll('[data-group]').forEach(el => {
    el.addEventListener('click', () => {
      state.group = el.dataset.group;
      state.pos = null;
      render();
    });
  });

  document.querySelectorAll('[data-pos]').forEach(el => {
    el.addEventListener('click', () => {
      state.pos = el.dataset.pos;
      render();
    });
  });

  document.querySelectorAll('[data-back]').forEach(el => {
    el.addEventListener('click', () => {
      if (el.dataset.back === 'phase') { state.phase = null; state.group = null; state.pos = null; }
      if (el.dataset.back === 'browser') { state.pos = null; }
      render();
    });
  });

  document.querySelectorAll('[data-qi]').forEach(el => {
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.qi);
      const oi = parseInt(el.dataset.oi);
      const ansKey = state.phase + '_' + state.pos;
      if (!state.answers[ansKey]) state.answers[ansKey] = {};
      if (state.answers[ansKey][qi] === undefined) {
        state.answers[ansKey][qi] = oi;
        render();
      }
    });
  });
}

render();
</script>
</body>
</html>
